services:
  postgres:
    image: postgres:16
    container_name: chatly-box-postgres
    environment:
      POSTGRES_DB: chatly_box
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatly_box"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
