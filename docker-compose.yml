services:
  postgres:
    image: postgres:16
    container_name: chatly-box-postgres
    environment:
      POSTGRES_DB: chatly_box
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatly_box"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: chatly-box-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/chatly-docs;
      mc anonymous set none local/chatly-docs;
      "

  elasticsearch:
    image: elasticsearch:9.4.1
    container_name: chatly-box-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatly-box-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/chatly_box
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      ADMIN_EMAIL: admin@company.local
      ADMIN_PASSWORD: admin12345
      CHATLY_NATIVE_LIBRARY: /app/lib/libchatly_llamalib.so
      LANCEDB_URI: /data/lancedb
      EMBEDDING_MODEL_PATH: /models/embedding.gguf
      CHAT_MODEL_PATH: /models/chat.gguf
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    ports:
      - "8080:8080"
    volumes:
      - lancedb_data:/data/lancedb
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatly-box-frontend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chatly_box?schema=public
      AUTH_SECRET: local-development-secret-change-for-production
      APP_URL: http://localhost:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLAMA_CPP_BASE_URL: http://host.docker.internal:8081
      ADMIN_EMAIL: admin@company.local
      ADMIN_PASSWORD: admin12345
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  lancedb_data:
  elastic_data:
