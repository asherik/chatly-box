services:
  postgres:
    image: postgres:16
    container_name: chatly-box-postgres
    environment:
      POSTGRES_DB: chatly_box
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatly_box"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: chatly-box-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/chatly-docs;
      mc anonymous set none local/chatly-docs;
      "

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: chatly-box-meilisearch
    environment:
      MEILI_MASTER_KEY: chatly-local-master-key
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: chatly-box-opensearch
    profiles: ["opensearch"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: admin
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatly-box-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/chatly_box
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      ADMIN_EMAIL: admin@company.local
      ADMIN_PASSWORD: admin12345
      CHATLY_NATIVE_LIBRARY: /app/lib/libchatly_llamalib.so
      LANCEDB_URI: /data/lancedb
      EMBEDDING_MODEL_PATH: /models/embedding.gguf
      CHAT_MODEL_PATH: /models/chat.gguf
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      SEARCH_ENGINE: ${SEARCH_ENGINE:-meili}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: chatly-local-master-key
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8080:8080"
    volumes:
      - lancedb_data:/data/lancedb
      - ./models:/models
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatly-box-frontend
    environment:
      AUTH_SECRET: local-development-secret-change-for-production
      BACKEND_URL: http://backend:8080
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  lancedb_data:
  meili_data:
  opensearch_data:
